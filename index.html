<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Tooling Management Group</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #F5F5F2;
      color: #2C2C2A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .logo-wrap {
      margin-bottom: 2.5rem;
    }
    .logo-wrap img {
      max-width: 320px;
      width: 100%;
      height: auto;
    }
    .card {
      background: #FFFFFF;
      border: 0.5px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      margin-bottom: 3rem;
    }
    .card-title {
      font-size: 18px;
      font-weight: 500;
      color: #2C2C2A;
      margin: 0;
    }
    .footer {
      border-top: 0.5px solid rgba(0, 0, 0, 0.12);
      padding-top: 1.5rem;
    }
    .footer p {
      font-size: 12px;
      color: #888780;
      margin: 0;
    }
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.25rem;
      }
      .logo-wrap img {
        max-width: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo-wrap">
      <img src="tmg-logo.png" alt="Tooling Management Group">
    </div>

    <div class="card">
      <p class="card-title">Site under construction</p>
    </div>

    <div class="footer">
      <p>Tooling Management Group &nbsp;&middot;&nbsp; Ann Arbor, Michigan</p>
    </div>
  </main>
</body>
</html>
